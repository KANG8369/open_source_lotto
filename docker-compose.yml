services:
  db:
    image: postgres:16-alpine
    container_name: lotto-db
    environment:
      POSTGRES_DB: lotto
      POSTGRES_USER: lotto
      POSTGRES_PASSWORD: lotto_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lotto -d lotto"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: lotto-web
    command: sh -c "python manage.py migrate && python manage.py collectstatic --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    environment:
      DJANGO_SECRET_KEY: change-this-secret-key-for-production
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0
      POSTGRES_DB: lotto
      POSTGRES_USER: lotto
      POSTGRES_PASSWORD: lotto_password
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
