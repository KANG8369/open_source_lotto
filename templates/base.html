{% load static %}
<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}6/45 Lotto{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'lotto/styles.css' %}">
</head>
<body>
  <header class="site-header">
    <nav class="nav">
      <a class="brand" href="{% url 'lotto:home' %}">6/45 Lotto</a>
      <div class="nav-links">
        <a href="{% url 'lotto:home' %}">구매/확인</a>
        <a href="{% url 'lotto:staff_dashboard' %}">관리자</a>
        <a href="/admin/">Django Admin</a>
      </div>
    </nav>
  </header>

  <main class="page">
    {% if messages %}
      <div class="messages">
        {% for message in messages %}
          <p class="message {{ message.tags }}">{{ message }}</p>
        {% endfor %}
      </div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
